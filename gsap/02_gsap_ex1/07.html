<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap scroll</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://unpkg.com/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>

        <style>
            * {
                box-sizing: border-box;
            }

            body {
                background: #000;
                color: #fff;
            }

            .con {
                background-color: #f0f0f0;
                color: #000;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
                margin-bottom: 50px;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #000;
            }
            .con4 {
                background-color: #fff0cc;
            }

            .con2 ul {
                display: flex;
                gap: 30px;
                flex-wrap: wrap;
            }

            .con2 ul li {
                width: 320px;
                height: 400px;
                background: #ccc;
                opacity: 0;
                transform: translateY(50px);
                border-radius: 10px;
            }

            .con2 ul li:nth-child(1) {
                background-color: #ffcccc;
            }
            .con2 ul li:nth-child(2) {
                background-color: #ccffcc;
            }
            .con2 ul li:nth-child(3) {
                background-color: #ccccff;
            }
            .con2 ul li:nth-child(4) {
                background-color: #fff3b0;
            }

            .text-box {
                font-size: 68px;
                font-family: 'Bebas Neue', serif;
                line-height: 1.3;
                margin-top: 100px;
                text-align: center;
            }

            .text-box .mask {
                display: block;
            }

            .text-box .mask .text {
                -webkit-text-fill-color: rgba(255, 255, 255, 0.2);
                -webkit-background-clip: text;
                background-repeat: no-repeat;
                background-image: linear-gradient(#fff, #fff);
                background-size: 0% 100%;
            }
        </style>
    </head>
    <body>
        <div class="con con1">
            <div class="inner"><h2>Section 1</h2></div>
        </div>

        <div class="con con2">
            <div class="inner">
                <h2>Section 2</h2>
                <ul>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </div>
        </div>

        <div class="con con3">
            <div class="inner">
                <h2>Section 3</h2>

                <!-- 텍스트 효과 영역 -->
                <div class="text-box">
                    <span class="mask">
                        <span class="text">
                            Hello, my name is Hong Gil-dong,<br />
                            and I am preparing<br />
                            for a career as a frontend developer.<br />
                        </span>
                    </span>
                </div>
            </div>
        </div>

        <div class="con con4">
            <div class="inner"><h2>Section 4</h2></div>
        </div>

        <script></script>
    </body>
</html>
