<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />

        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <style>
            .con-box {
                width: 100vw;
                height: 100vh;
                background-color: #000;
                color: #fff;
                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
            }
            .con-box h2 {
                font-size: 50px;
                line-height: 1.4;
            }

            .con-box .txt {
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="con-box">
            <h2>
                web project<br />
                <span class="txt">Portfolio</span>
            </h2>
        </div>

        <script>
            gsap.from('h2', {
                y: 50,
                opacity: 0,
                duration: 1.5,
            });
            gsap.from('h2 .txt', {
                y: 50,
                scale: 0.8,
                delay: 0.5,
                opacity: 0,
                duration: 1,
            });
        </script>
    </body>
</html>
