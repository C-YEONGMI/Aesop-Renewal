<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap scroll</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://unpkg.com/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>

        <style>
            * {
                box-sizing: border-box;
            }

            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
                margin-bottom: 50px;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }

            .con2 ul {
                display: flex;
                gap: 30px;
                flex-wrap: wrap;
            }

            .con2 ul li {
                width: 320px;
                height: 400px;
                background: #ccc;
                opacity: 0;
                transform: translateY(50px);
                border-radius: 10px;
            }

            .con2 ul li:nth-child(1) {
                background-color: #ffcccc;
            }
            .con2 ul li:nth-child(2) {
                background-color: #ccffcc;
            }
            .con2 ul li:nth-child(3) {
                background-color: #ccccff;
            }
            .con2 ul li:nth-child(4) {
                background-color: #fff3b0;
            }
        </style>
    </head>
    <body>
        <div class="con con1">
            <div class="inner"><h2>Section 1</h2></div>
        </div>

        <div class="con con2">
            <div class="inner">
                <h2>Section 2</h2>
                <ul>
                    <li></li>
                    <li></li>
                    <li></li>
                    <li></li>
                </ul>
            </div>
        </div>

        <div class="con con3">
            <div class="inner"><h2>Section 3</h2></div>
        </div>

        <div class="con con4">
            <div class="inner"><h2>Section 4</h2></div>
        </div>

        <script></script>
    </body>
</html>
