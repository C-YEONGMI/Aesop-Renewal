<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="../assets/css/reset.css" />
        <link rel="stylesheet" href="./css/styles.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner">
                    <h2>Section 2</h2>
                    <div class="btn-wrap">
                        <div class="btn-item drawer">
                            <div class="btn-icon-name">Work</div>
                        </div>
                    </div>
                    <div class="cards">
                        <div class="close">
                            <i class="xi-close-thin"></i>
                        </div>
                        <div class="card c1">콘텐츠 기획</div>
                        <div class="card c2">UI/UX 설계</div>
                        <div class="card c3">기술적 설계</div>
                        <div class="card c4">기능 테스트</div>
                        <div class="card c5">사용성 테스트</div>
                        <div class="last">사용자 친화적인 인터페이스 구현</div>
                    </div>
                </div>
            </div>

            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>

        <script src="js/script.js"></script>
    </body>
</html>
