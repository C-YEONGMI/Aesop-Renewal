<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" href="favicon.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>정은씨 질문</title>
        <link rel="stylesheet" href="../assets/css/reset.css" />
        <!-- Swiper CSS (CDN) -->
        <link rel="stylesheet" href="https://unpkg.com/swiper@11/swiper-bundle.min.css" />

        <style>
            :root {
                --swiper-theme-color: #007aff;
            }

            /* ==== Swiper    ==== */
            .swiper {
                position: relative;
                overflow: hidden;
                list-style: none;
                padding: 0;
                z-index: 1;
            }
            .swiper-wrapper {
                position: relative;
                width: 100%;
                height: 100%;
                display: flex;
                transition-property: transform;
                box-sizing: content-box;
            }
            .swiper-slide {
                flex-shrink: 0;
                width: 100%;
                height: 100%;
                position: relative;
                display: block;
            }

            /* ==== Fashion Slider 변수 ==== */
            :root {
                --fashion-slider-font-family: sans-serif;
                --fashion-slider-button-side-offset: 32px;
                --fashion-slider-button-mobile-side-offset: 24px;
                --fashion-slider-button-mobile-bottom-offset: 16px;
                --fashion-slider-title-font-size: 80px;
                --fashion-slider-title-line-height: 1.2;
            }

            html,
            body {
                height: 100%;
                margin: 0;
                padding: 0;
            }
            body {
                color: #fff;
                line-height: 1.5;
                font-family: -apple-system, system-ui, Helvetica Neue, Helvetica, Arial, Segoe UI,
                    Roboto, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            #app {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .fashion-slider {
                width: 100%;
                height: 100%;
                font-family: var(--fashion-slider-font-family);
                --fashion-slider-title-font-size: 88px;
            }
            @media (max-width: 480px) {
                .fashion-slider {
                    --fashion-slider-title-font-size: 60px;
                }
            }

            /* 전환 잠금 때 부드럽게 끊김 방지 */
            .fashion-slider-no-transition {
                transition-duration: 0ms !important;
                transition-delay: 0ms !important;
                transition-property: none !important;
            }
            .fashion-slider-no-transition *:not(.swiper-wrapper) {
                transition-duration: 0ms !important;
                transition-delay: 0ms !important;
                transition-property: none !important;
            }
            .fashion-slider-no-transition .swiper-wrapper {
                transition-delay: 0ms !important;
            }

            .fashion-slider .swiper {
                width: 100%;
                height: 100%;
                transition: 1s background-color 1.3s;
            }
            .fashion-slider .swiper-wrapper {
                transition-delay: 1s;
                transition-timing-function: cubic-bezier(0.5, 0, 0, 1);
            }
            .fashion-slider .swiper-slide {
                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
            }

            .fashion-slider-title {
                transition-delay: 1s;
                z-index: 10;
            }
            .fashion-slider-title-text {
                font-weight: 700;
                font-size: var(--fashion-slider-title-font-size);
                line-height: var(--fashion-slider-title-line-height);
                letter-spacing: -1px;
                color: #fff0;
                -webkit-text-stroke: 2px #fff;
            }

            .fashion-slider-scale {
                width: 100%;
                height: 100%;
                position: absolute;
                transform: scale(0.6);
                transition-duration: 1s;
                transition-property: transform;
                transition-timing-function: cubic-bezier(0.5, 0, 0, 1);
                opacity: 0.9;
                overflow: hidden;
            }
            .fashion-slider-scale img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                transform: scale(1.2) translate(50%);
                transition-timing-function: cubic-bezier(0.5, 0, 0, 1);
                transition-property: transform;
            }

            .fashion-slider-button {
                transition: 0.5s;
                outline: none;
                position: absolute;
                width: 140px;
                z-index: 10;
                top: 50%;
                transform: translateY(-50%);
                cursor: pointer;
            }
            .fashion-slider-button-prev {
                left: var(--fashion-slider-button-side-offset);
            }
            .fashion-slider-button-next {
                right: var(--fashion-slider-button-side-offset);
            }
            @media (max-width: 640px) {
                .fashion-slider-button {
                    top: auto;
                    bottom: var(--fashion-slider-button-mobile-bottom-offset);
                    transform: none;
                }
                .fashion-slider-button-prev {
                    left: var(--fashion-slider-button-mobile-side-offset);
                }
                .fashion-slider-button-next {
                    right: var(--fashion-slider-button-mobile-side-offset);
                }
            }
            .fashion-slider-button-disabled {
                opacity: 0.2;
                cursor: default;
            }

            .fashion-slider-button svg {
                display: block;
                transition: 0.5s;
            }
            .fashion-slider-button .fashion-slider-svg-circle-wrap {
                transition: 0.5s;
                transform-origin: -20px 40px;
                opacity: 1;
            }
            .fashion-slider-button circle {
                transition: 0.5s;
                stroke-width: 2px;
                stroke: #fff;
                fill: none;
                stroke-dasharray: 1;
                stroke-dashoffset: 1;
                opacity: 1;
                transform-origin: 0 0 0;
            }
            .fashion-slider-button .fashion-slider-svg-arrow {
                transition: 0.5s;
                fill: #fff;
                transform: rotateY(180deg) translate(-55px, 36.1px) scale(1.75);
            }
            .fashion-slider-button .fashion-slider-svg-wrap {
                transform: translateY(353px);
            }
            .fashion-slider-button-next .fashion-slider-svg-wrap {
                transform: translateY(353px) rotateY(180deg);
                transform-origin: 80px 0 0;
            }
            .fashion-slider-button .fashion-slider-svg-line {
                transition: 0.5s;
                stroke: #fff;
                stroke-width: 2;
                transform: translate(50px, 42px);
            }

            .fashion-slider-button-prev:not(.fashion-slider-button-disabled):hover svg {
                transform: translate(-16px);
            }
            .fashion-slider-button-next:not(.fashion-slider-button-disabled):hover svg {
                transform: translate(16px);
            }
            .fashion-slider-button:not(.fashion-slider-button-disabled):hover
                .fashion-slider-svg-circle-wrap {
                transform: scale(1.1);
            }
            .fashion-slider-button:not(.fashion-slider-button-disabled):hover circle {
                stroke-dasharray: 4px;
                stroke-dashoffset: 4px;
                opacity: 1;
            }
            .fashion-slider-button:not(.fashion-slider-button-disabled):hover
                .fashion-slider-svg-arrow {
                transform: rotateY(180deg) translate(-40px, 36.1px) scale(1.75);
            }
            .fashion-slider-button:not(.fashion-slider-button-disabled):hover
                .fashion-slider-svg-line {
                transform: translate(35px, 42px) scaleX(0.5);
            }
        </style>
    </head>
    <body>
        <div id="app">
            <div class="fashion-slider">
                <div class="swiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide" data-slide-bg-color="#9FA051">
                            <div class="fashion-slider-title" data-swiper-parallax="-130%">
                                <div class="fashion-slider-title-text">Nike</div>
                            </div>
                            <div class="fashion-slider-scale">
                                <img src="images/img1.jpg" alt="Nike" />
                            </div>
                        </div>

                        <div class="swiper-slide" data-slide-bg-color="#9B89C5">
                            <div class="fashion-slider-title" data-swiper-parallax="-130%">
                                <div class="fashion-slider-title-text">Puma</div>
                            </div>
                            <div class="fashion-slider-scale">
                                <img src="images/img2.jpg" alt="Puma" />
                            </div>
                        </div>

                        <div class="swiper-slide" data-slide-bg-color="#D7A594">
                            <div class="fashion-slider-title" data-swiper-parallax="-130%">
                                <div class="fashion-slider-title-text">Yeeze</div>
                            </div>
                            <div class="fashion-slider-scale">
                                <img src="images/img3.jpg" alt="Yeeze" />
                            </div>
                        </div>
                    </div>

                    <!-- Prev -->
                    <div
                        class="fashion-slider-button-prev fashion-slider-button"
                        aria-label="Previous slide"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 350 160 90">
                            <g class="fashion-slider-svg-wrap">
                                <g class="fashion-slider-svg-circle-wrap">
                                    <circle cx="42" cy="42" r="40"></circle>
                                </g>
                                <path
                                    class="fashion-slider-svg-arrow"
                                    d="M.983,6.929,4.447,3.464.983,0,0,.983,2.482,3.464,0,5.946Z"
                                ></path>
                                <path class="fashion-slider-svg-line" d="M80,0H0"></path>
                            </g>
                        </svg>
                    </div>

                    <!-- Next -->
                    <div
                        class="fashion-slider-button-next fashion-slider-button"
                        aria-label="Next slide"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 350 160 90">
                            <g class="fashion-slider-svg-wrap">
                                <g class="fashion-slider-svg-circle-wrap">
                                    <circle cx="42" cy="42" r="40"></circle>
                                </g>
                                <path
                                    class="fashion-slider-svg-arrow"
                                    d="M.983,6.929,4.447,3.464.983,0,0,.983,2.482,3.464,0,5.946Z"
                                ></path>
                                <path class="fashion-slider-svg-line" d="M80,0H0"></path>
                            </g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <!-- Swiper JS (CDN) -->
        <script src="https://unpkg.com/swiper@11/swiper-bundle.min.js"></script>
        <!-- 참고 사이트 : https://fashion-slider.uiinitiative.com/  -->
        <script src="app.js"></script>
    </body>
</html>
