<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="../assets//css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />

        <style>
            @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap');
            .con {
                background-color: #f0f0f0;
            }
            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }
            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }
            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                /* background-color: #e5e5ff; */
            }
            .con3 .inner {
                width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }

            .con3 .text {
                box-sizing: border-box;
                font-size: 8vw;
                font-family: 'Oswald', sans-serif;
                position: relative;
                margin: 0;
                display: flex;
                cursor: pointer;
                border-bottom: 1px solid #555;
                line-height: 120%;
                text-indent: 30px;
            }
            .con3 .text:first-child {
                border-top: 1px solid #555;
            }

            .con3 .text span {
                position: absolute;
                width: 100%;
                height: 100%;
                background-color: #ff7a1a;
                color: black;
                clip-path: polygon(0 50%, 100% 50%, 100% 50%, 0 50%);
                transition: clip-path 0.3s ease;
            }

            .con3 .text:hover span {
                clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
            }

            .con3 .images {
                width: 30vw;
                height: 60vh;
                display: flex;
                justify-content: center;
                align-items: center;
                position: absolute;
                right: 5%;
                top: 50%;
                transform: translateY(-50%);
            }

            .con3 .images img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                position: absolute;
                opacity: 0;
                transform: translateY(10%);
                transition:
                    opacity 0.3s ease,
                    transform 0.3s ease;
                border: 1px solid #555;
                border-radius: 0.75rem;
            }

            .con3 .t1:hover ~ .images .i1,
            .con3 .t2:hover ~ .images .i2,
            .con3 .t3:hover ~ .images .i3,
            .con3 .t4:hover ~ .images .i4,
            .con3 .t5:hover ~ .images .i5 {
                opacity: 1;
                transform: translateY(0%);
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3">
                <div class="inner">
                    <p class="text t1">INNOVATION<span>CREATES FUTURE</span></p>
                    <p class="text t2">DESIGN MEETS<span>TECHNOLOGY</span></p>
                    <p class="text t3">BRINGING IDEAS<span>TO LIFE</span></p>
                    <p class="text t4">CREATIVE<span>DEVELOPMENT</span></p>
                    <p class="text t5">WELCOME TO<span>MY PORTFOLIO</span></p>

                    <div class="images">
                        <img class="i1" src="../assets/images/img21.jpg" alt="" />
                        <img
                            class="i2"
                            src="../assets/images/imgi_01_process_planning02.jpg"
                            alt=""
                        />
                        <img
                            class="i3"
                            src="../assets/images/imgi_01_process_planning01.jpg"
                            alt=""
                        />
                        <img class="i4" src="../assets/images/img22.jpg" alt="" />
                        <img
                            class="i5"
                            src="../assets/images/imgi_01_process_planning01.jpg"
                            alt=""
                        />
                    </div>
                </div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>
    </body>
</html>
