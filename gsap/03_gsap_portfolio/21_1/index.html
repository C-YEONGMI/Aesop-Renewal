<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>홍길동 포트폴리오</title>
        <link rel="stylesheet" href="../assets/css/reset.css" />
        <link rel="stylesheet" href="./css/styles.css" />
    </head>
    <body>
        <div class="con2">
            <div class="slider-container">
                <div class="slider">
                    <div class="slide" id="slide-1">
                        <img src="../assets/images/img1.jpg" alt="" />
                    </div>
                    <div class="slide" id="slide-2">
                        <img src="../assets/images/img2.jpg" alt="" />
                    </div>
                    <div class="slide" id="slide-3">
                        <img src="../assets/images/img3.jpg" alt="" />
                    </div>
                    <div class="slide" id="slide-4">
                        <img src="../assets/images/img4.jpg" alt="" />
                    </div>
                    <div class="slide" id="slide-5">
                        <img src="../assets/images/img5.jpg" alt="" />
                    </div>
                </div>

                <div class="slider-content">
                    <div class="slide-title">
                        <div class="prefix">Frontend</div>
                        <div class="postfix">
                            <div>Motion UI</div>
                            <div>Publishing</div>
                            <div>Responsive</div>
                            <div>Javascript</div>
                            <div>ReactJS</div>
                        </div>
                    </div>
                </div>

                <div class="slider-indicator">
                    <div class="index active"></div>
                    <div class="index"></div>
                    <div class="index"></div>
                    <div class="index"></div>
                    <div class="index"></div>
                </div>

                <div class="link">
                    <div class="link-wrapper">
                        <a href="#">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                width="300"
                                height="300"
                                viewBox="0 0 100 100"
                            >
                                <path
                                    id="link-svg"
                                    d="M50,10 A40,40 0 1,1 49.9999,10"
                                    stroke="#fff"
                                    stroke-width="0.75"
                                    fill="none"
                                />
                            </svg>

                            <div class="link-label">
                                <div class="line line-1">
                                    <p>View</p>
                                </div>
                                <div class="line line-2">
                                    <p>Project</p>
                                </div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <!--  -->
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>
        <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script>
        <script src="../plugins/splitText.js"></script>

        <script type="module" src="js/script.js"></script>
    </body>
</html>
