<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>홍길동 포트폴리오</title>
        <link rel="stylesheet" href="../assets/css/reset.css" />
        <link rel="stylesheet" href="./css/styles.css" />
    </head>
    <body>
        <div class="container">
            <section class="hero">
                <h1><span>Enter a Universe</span> Powered by Imagination</h1>
            </section>

            <section class="sticky">
                <div class="bg-img"><img src="../assets/images/img-8.jpeg" alt="" /></div>

                <canvas class="outline-layer"></canvas>

                <div class="cards">
                    <div class="card">
                        <div class="card-img"><img src="../assets/images/img-1.jpg" alt="" /></div>
                        <div class="card-title">
                            <h1>React Interfaces</h1>
                            <p>FRONT001</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-img"><img src="../assets/images/img-2.jpg" alt="" /></div>
                        <div class="card-title">
                            <h1>GSAP Animations</h1>
                            <p>FRONT002</p>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-img"><img src="../assets/images/img-3.jpg" alt="" /></div>
                        <div class="card-title">
                            <h1>UX Design Systems</h1>
                            <p>FRONT003</p>
                        </div>
                    </div>
                </div>

                <canvas class="fill-layer"></canvas>
            </section>

            <section class="outro">
                <h1>Chase the <span>bugs</span> to embrace the code</h1>
            </section>
        </div>
        <!--  -->
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
        <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script>
        <script src="../plugins/splitText.js"></script>

        <script type="module" src="js/script.js"></script>
    </body>
</html>
