<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>

        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <link rel="stylesheet" href="../assets/css/reset.css" />
        <link rel="stylesheet" href="./css/styles.css" />
    </head>
    <body>
        <div id="wrap">
            <nav class="nav">
                <div class="logo">
                    <a href="#">ezen's</a>
                </div>

                <div class="links">
                    <a href="#">Home</a>
                    <a href="#">About</a>
                    <a href="#">Projects</a>
                    <a href="#">Contact</a>
                </div>
            </nav>

            <section class="man-banner">
                <h2>Frontend Portfolio</h2>

                <div class="main-copy">
                    <p>Interactive Frontend Portfolio</p>
                    <p>스크롤아이콘</p>
                </div>
            </section>

            <section class="intro">
                <div class="video-container-desktop">
                    <div class="video-preview">
                        <div class="video-wrapper">
                            <!-- 포트폴리 작업물 영상 찍어서 -->
                            <video src="../assets/video/sample.mp4" autoplay muted loop></video>
                        </div>
                    </div>
                    <div class="video-title">
                        <p>My Projects</p>
                        <p>2025</p>
                    </div>
                </div>
            </section>
            <!-- 인터렉션 처리 끝 -->

            <!-- 각각 컨텐츠 페이지 con1,con2등  -->
            <section class="con con1">
                <h2>Frontend Portfolio.</h2>
            </section>
            <section class="con con2">
                <h2>Portfolio.</h2>
            </section>
        </div>
        <!--  -->

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>
        <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script>
        <script src="../plugins/splitText.js"></script>

        <script src="js/script.js"></script>
    </body>
</html>
