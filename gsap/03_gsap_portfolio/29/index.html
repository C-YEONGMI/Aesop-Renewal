<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>홍길동 포트폴리오</title>
        <link rel="stylesheet" href="../assets/css/reset.css" />
        <link rel="stylesheet" href="./css/styles.css" />
    </head>
    <body>
        <div class="slider-content">
            <div class="slide-number">
                <div class="prefix">
                    <div>1</div>
                    <div>2</div>
                    <div>3</div>
                    <div>4</div>
                    <div>5</div>
                </div>
                <div class="postfix"><span>/</span> 5</div>
            </div>

            <div class="slide-name">
                <div class="names title">
                    <div>프로젝트 타이틀1</div>
                    <div>프로젝트 타이틀2</div>
                    <div>프로젝트 타이틀3</div>
                    <div>프로젝트 타이틀4</div>
                    <div>프로젝트 타이틀5</div>
                </div>
            </div>

            <div class="slide-text">
                <div class="texts">
                    <div>팀프로젝트1</div>
                    <div>팀프로젝트2</div>
                    <div>개인프로젝트</div>
                    <div>개인프로젝트</div>
                    <div>세미 프로젝트</div>
                </div>
            </div>
        </div>
        <div class="slider">
            <div class="slide" id="slide-1">
                <img src="../assets/images/img-1.jpg" alt="" />
            </div>
            <div class="slide" id="slide-2">
                <img src="../assets/images/img-2.jpg" alt="" />
            </div>
            <div class="slide" id="slide-3">
                <img src="../assets/images/img-3.jpg" alt="" />
            </div>
            <div class="slide" id="slide-4">
                <img src="../assets/images/img-4.jpg" alt="" />
            </div>
            <div class="slide" id="slide-5">
                <img src="../assets/images/img-2.jpg" alt="" />
            </div>
            <div style="height: 400vh"></div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>
        <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script>
        <script src="../plugins/splitText.js"></script>

        <script type="module" src="js/script.js"></script>
    </body>
</html>
