<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>

        <link rel="stylesheet" href="../assets/css/reset.css" />
        <link rel="stylesheet" href="./css/styles.css" />

        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3">
                <h2>Portfolio Process</h2>

                <div class="whitespace w-1"></div>

                <div class="gallery">
                    <div class="project">
                        <div class="index">
                            <div class="mask"><strong>01</strong></div>
                        </div>
                        <div class="images"></div>
                    </div>
                    <div class="project">
                        <div class="index">
                            <div class="mask"><strong>02</strong></div>
                        </div>
                        <div class="images"></div>
                    </div>
                    <div class="project">
                        <div class="index">
                            <div class="mask"><strong>03</strong></div>
                        </div>
                        <div class="images"></div>
                    </div>
                    <div class="project">
                        <div class="index">
                            <div class="mask"><strong>04</strong></div>
                        </div>
                        <div class="images"></div>
                    </div>
                    <div class="project">
                        <div class="index">
                            <div class="mask"><strong>05</strong></div>
                        </div>
                        <div class="images"></div>
                    </div>
                    <div class="project">
                        <div class="index">
                            <div class="mask"><strong>06</strong></div>
                        </div>
                        <div class="images"></div>
                    </div>
                </div>

                <div class="whitespace w-2"></div>

                <div class="project-names">
                    <div class="indicator">
                        <div class="symbol"></div>
                    </div>
                    <div class="name active"><p>프로젝트 기획</p></div>
                    <div class="name"><p>프로젝트 디자인</p></div>
                    <div class="name"><p>프로젝트 화면구현</p></div>
                    <div class="name"><p>리액트 + 상태관리(Redux,Zustand, React Query)</p></div>
                    <div class="name"><p>팀 프로젝트 github 및 배포</p></div>
                    <div class="name"><p>프로젝트 발표 및 팀</p></div>
                </div>

                <div class="preview-img">
                    <img src="../assets/imgs/img1.jpg" alt="" />
                </div>

                <div class="progress-bar"></div>
            </div>
            <!-- //con3 -->

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>
        <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script>
        <script src="../plugins/splitText.js"></script>

        <script type="module" src="js/script.js"></script>
    </body>
</html>
