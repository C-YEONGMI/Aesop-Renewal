<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="../assets/css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />

        <style>
            .con {
                background: #f0f0f0;
            }
            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                padding: 150px 0;
            }
            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }
            .con1 {
                background: #ffe5e5;
            }
            .con2 {
                background: #e5ffe5;
            }
            .con3 {
                background: #e5e5ff;
            }
            .con4 {
                background: #fff0cc;
            }

            /* 로딩 오버레이 */
            .text {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: grid;
                place-content: center;
                gap: 24px;
                background: #fff;
                transition: opacity 0.5s ease, visibility 0.5s ease;
                background: #000;
            }
            .text.is-hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            .counter,
            .logo p {
                font-size: clamp(48px, 12vw, 200px);
                text-align: center;
                text-transform: uppercase;
                font-weight: 900;
                line-height: 1;
                color: #fff;
            }
            .counter p span,
            .logo p span {
                position: relative;
                display: inline-block;
                color: #fff;
            }
            .logo p span {
                top: 200px;
            } /* 처음엔 아래 */
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>
            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>
            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>
            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>

            <!-- 로딩 오버레이 -->
            <div class="text" id="loader">
                <div class="counter"><p>0%</p></div>
                <div class="logo"><p>EZEN</p></div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>

        <script>
            (function () {
                // ---------- 유틸 ----------
                const $ = (sel, ctx = document) => ctx.querySelector(sel);
                const $$ = (sel, ctx = document) => Array.from(ctx.querySelectorAll(sel));
                const warn = (...args) => console.warn('[GSAP]', ...args);

                function hasTargets(sel) {
                    try {
                        return $$(sel).length > 0;
                    } catch {
                        return false;
                    }
                }

                function safeTo(tl, targets, vars, pos) {
                    // 타깃 없으면 스킵
                    if (!hasTargets(targets)) {
                        warn('skip (no targets):', targets);
                        return tl;
                    }
                    try {
                        return tl.to(targets, vars, pos);
                    } catch (e) {
                        console.error('GSAP .to error:', { targets, vars, pos, e });
                        return tl;
                    }
                }

                function splitTextIntoSpansSafe(selector) {
                    const el = $(selector);
                    if (!el) {
                        warn('split skipped (no element):', selector);
                        return;
                    }
                    // 이미 분할되어 있으면 스킵
                    if ([...el.childNodes].some((n) => n.nodeType === 1 && n.tagName === 'SPAN'))
                        return;
                    try {
                        el.innerHTML = el.textContent
                            .split('')
                            .map((ch) => `<span>${ch}</span>`)
                            .join('');
                    } catch (e) {
                        console.error('splitTextIntoSpans error:', e);
                    }
                }

                function finallyHide(el) {
                    try {
                        el?.classList.add('is-hidden');
                    } catch {}
                }

                // ---------- 시작 ----------
                document.addEventListener('DOMContentLoaded', () => {
                    const loader = $('#loader');
                    const counterEl = $('.counter p');

                    // GSAP 로드 실패 방어
                    if (!window.gsap) {
                        warn('GSAP not loaded. Hiding loader.');
                        finallyHide(loader);
                        return;
                    }

                    // 접근성: 모션 최소화 시 즉시 종료
                    const mql = window.matchMedia('(prefers-reduced-motion: reduce)');
                    if (mql.matches) {
                        if (counterEl) counterEl.textContent = '100%';
                        finallyHide(loader);
                        return;
                    }

                    // 로고 분할
                    splitTextIntoSpansSafe('.logo p');

                    // 카운트 상태
                    let n = { v: 0 };

                    let tl;
                    try {
                        tl = gsap.timeline({
                            defaults: { ease: 'power3.out' },
                            onComplete: () => finallyHide(loader),
                        });

                        // 0 → 100 (숫자만 갱신, %는 span으로)
                        if (counterEl) counterEl.innerHTML = '0<span>%</span>';
                        tl.to(n, {
                            v: 100,
                            duration: 0.8,
                            ease: 'power2.out',
                            onUpdate: () => {
                                try {
                                    if (!counterEl) return;
                                    const val = Math.round(n.v);
                                    counterEl.innerHTML = `${val}<span>%</span>`;
                                } catch (e) {
                                    console.error('counter update error:', e);
                                }
                            },
                        });

                        // 100% 개별 글자 위로
                        safeTo(
                            tl,
                            '.counter p span',
                            {
                                yPercent: -150,
                                stagger: 0.05,
                                duration: 0.6,
                                ease: 'power3.in',
                            },
                            '>'
                        );

                        // counter 래퍼 페이드 아웃
                        safeTo(
                            tl,
                            '.counter',
                            {
                                opacity: 0,
                                duration: 0.5,
                                ease: 'power2.out',
                            },
                            '>'
                        );

                        // EZEN 등장 (동시에)
                        safeTo(
                            tl,
                            '.logo p span',
                            {
                                top: 0,
                                stagger: 0.06,
                                duration: 0.5,
                                ease: 'power3.out',
                            },
                            '<'
                        );

                        // 1초 보여주고 위로 퇴장
                        safeTo(
                            tl,
                            '.logo p span',
                            {
                                yPercent: -150,
                                stagger: 0.05,
                                duration: 0.4,
                                ease: 'power3.in',
                            },
                            '>1'
                        );
                    } catch (e) {
                        console.error('timeline build error:', e);
                        // 오류 시에도 로더는 제거
                        finallyHide(loader);
                    }

                    // 안전장치: 6초가 지나도 onComplete 못 타면 강제 숨김
                    setTimeout(() => finallyHide(loader), 6000);
                });
            })();
        </script>
    </body>
</html>
