<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>홍길동 포트폴리오</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Orbitron&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../assets/css/reset.css" />
        <link rel="stylesheet" href="./css/styles.css" />
    </head>
    <body>
        <div class="con con1">
            <div class="inner"><h2>Section 1</h2></div>
        </div>
        <div class="con con2">
            <div class="inner">
                <h2>Section 2</h2>

                <div class="items">
                    <div class="item" id="item-1">
                        <div class="item-img">
                            <img src="../assets/images/img-1.jpg" alt="" />
                        </div>
                        <div class="item-copy">
                            <div class="item-copy-1">
                                <div class="shape">
                                    <div id="number"><span>0</span><span>1</span></div>
                                    <div class="text-right">
                                        <span>p</span><span>o</span><span>r</span><span>t</span>
                                        <span>f</span><span>o</span><span>l</span><span>i</span>
                                        <span>o</span>
                                    </div>
                                </div>
                            </div>
                            <div class="item-copy-2">
                                <div class="shape">
                                    <div>
                                        <span>g</span><span>s</span><span>a</span><span>p</span>
                                    </div>
                                    <div class="text-right">
                                        <span>s</span><span>c</span><span>r</span><span>o</span>
                                        <span>l</span><span>l</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!--  -->
                    <div class="item" id="item-2">
                        <div class="item-img">
                            <img src="../assets/images/img-2.jpg" alt="" />
                        </div>
                        <div class="item-copy">
                            <div class="item-copy-1">
                                <div class="shape">
                                    <div id="number" class="text-right">
                                        <span>0</span><span>2</span>
                                    </div>
                                    <div>
                                        <span>p</span><span>r</span><span>o</span><span>j</span>
                                        <span>e</span><span>c</span><span>t</span><span>s</span>
                                    </div>
                                </div>
                            </div>
                            <div class="item-copy-2">
                                <div class="shape">
                                    <div class="text-right">
                                        <span>r</span><span>e</span><span>a</span><span>c</span
                                        ><span>t</span>
                                    </div>
                                    <div>
                                        <span>r</span><span>e</span><span>s</span><span>p</span>
                                        <span>o</span><span>n</span><span>s</span><span>i</span>
                                        <span>v</span><span>e</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <!--  -->
            </div>
        </div>

        <div class="con con3">
            <div class="inner"><h2>Section 3</h2></div>
        </div>

        <div class="con con4">
            <div class="inner"><h2>Section 4</h2></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/MotionPathPlugin.min.js"></script>
        <script src="https://unpkg.com/lenis@1.1.19/dist/lenis.min.js"></script>
        <script src="../plugins/splitText.js"></script>

        <script type="module" src="js/script.js"></script>
    </body>
</html>
