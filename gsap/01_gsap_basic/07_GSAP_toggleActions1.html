<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>foncybox</title>
        <link rel="stylesheet" href="css/reset.css" />

        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <style>
            body {
                height: 2000px;
            }
            .box {
                width: 100px;
                height: 100px;
                background: teal;
                margin-left: 30px;
                margin-top: 1000px;
            }
        </style>
    </head>
    <body>
        <div class="box"></div>
        <script>
            gsap.to('.box', {
                x: 300,
                duration: 1,
                scrollTrigger: {
                    trigger: '.box',
                    start: 'top 80%',
                    toggleActions: 'play none none reverse',
                    // play: 처음 진입 시 실행
                    // none: 아래로 나가도 아무것도 안 함
                    // none: 다시 들어와도 아무것도 안 함
                    // reverse: 위로 벗어나면 원상복귀
                    markers: true,
                },
            });
        </script>
    </body>
</html>
