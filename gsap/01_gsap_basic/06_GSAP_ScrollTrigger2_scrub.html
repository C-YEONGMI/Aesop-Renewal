<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />

        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <style>
            body {
                height: 2000px;
            }
            .box {
                width: 100px;
                height: 100px;
                background: teal;
                margin-left: 20px;
                margin-top: 1000px;
            }
        </style>
    </head>
    <body>
        <div class="box"></div>
        <script>
            gsap.to('.box', {
                scrollTrigger: {
                    trigger: '.box',
                    start: 'top center', // 요소 top이 화면 중앙에 도달
                    end: 'bottom center', // 요소 bottom이 화면 중앙에 도달
                    scrub: 1,
                    markers: true,
                },
                x: 300,
                rotation: 360,
            });
        </script>
    </body>
</html>
