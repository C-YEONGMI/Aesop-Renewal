<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />

        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/ScrollTrigger.min.js"></script>
        <style>
            .con {
                height: 800px;
                border: 1px solid #000;
            }
            .con3 {
                background: beige;
                position: relative;
            }
            .box {
                width: 100px;
                height: 100px;
                background: teal;
                position: absolute;
                left: 200px;
                top: 400px;
            }
        </style>
    </head>
    <body>
        <div class="con"></div>
        <div class="con"></div>
        <div class="con con3">
            <div class="box"></div>
        </div>
        <div class="con"></div>

        <script>
            gsap.to('.box', {
                scrollTrigger: {
                    trigger: '.box',
                    start: 'top 50%', // 요소가 화면 아래 등장하자마자
                    end: 'top top', // 요소가 화면 위에 도달할 때
                    scrub: true,
                    markers: true,
                },
                x: 300,
                opacity: 1,
            });
        </script>
    </body>
</html>
