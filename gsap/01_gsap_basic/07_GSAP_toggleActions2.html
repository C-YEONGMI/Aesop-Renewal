<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />

        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://unpkg.com/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>
        <style>
            body {
                height: 2000px;
            }
            .box {
                width: 100px;
                height: 100px;
                background: teal;
                transform: translate(200px, 1000px);
            }
        </style>
    </head>
    <body>
        <div class="box"></div>
        <script>
            gsap.to('.box', {
                x: 300,
                duration: 1,
                rotation: 360,
                scale: 2,
                scrollTrigger: {
                    trigger: '.box',
                    start: 'top 80%',
                    end: 'top 30%',
                    markers: true, // 마커 표시
                    toggleActions: 'play reverse play reverse',
                },
            });
        </script>
    </body>
</html>
