<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollToPlugin.min.js"></script>

        <style>
            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }
            .svg-container {
                position: absolute;
                top: 0;
                left: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 3000px;
            }

            svg {
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>
        <div class="svg-container">
            <svg
                width="514"
                height="1923"
                viewBox="0 0 514 1923"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
            >
                <path
                    d="M233.008 1C233.008 1 8.07839 150.796 1.19106 316.279C-8.81896 556.791 377.972 505.108 344.493 741.538C318.663 923.945 52.5093 819.747 52.5093 1064.15C52.5093 1342.65 549.7 1284.56 510.835 1557.84C475.408 1806.95 1.19107 1922 1.19107 1922"
                    stroke="black"
                />
            </svg>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            // SVG path 선택
            const path = document.querySelector('.svg-container path');

            // 전체 길이 계산
            const pathLength = path.getTotalLength();
            console.log(pathLength);

            // 초기 설정: dash 길이와 offset 모두 설정
            gsap.set(path, {
                strokeDasharray: pathLength,
                strokeDashoffset: pathLength,
            });

            // 스크롤 애니메이션 정의
            gsap.fromTo(
                path,
                {
                    strokeDashoffset: pathLength,
                },
                {
                    strokeDashoffset: 0,
                    ease: 'none',
                    scrollTrigger: {
                        trigger: '.svg-container',
                        start: 'top top',
                        end: 'bottom bottom',
                        scrub: 1,
                        // markers: true
                    },
                }
            );
        </script>
    </body>
</html>
