<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollToPlugin.min.js"></script>

        <style>
            @font-face {
                font-family: 'helvetica';
                src: url('../fonts/Helvetica Now Display Bold.otf');
                font-weight: 700;
            }

            @font-face {
                font-family: 'helvetica';
                src: url('../fonts/Helvetica Now Display Medium.otf');
                font-weight: 500;
            }

            @font-face {
                font-family: 'helvetica';
                src: url('../fonts/Helvetica Now Display Lt It.otf');
                font-weight: 300;
            }

            :root {
                --primary: #6067f3;
                --secondary: #e8e2da;
                --white: #fff;
                --black: #000;
            }
            body {
                font-size: 1vw;
                background: var(--primary);
                color: var(--secondary);
                font-family: 'helvetica', sans-serif;
            }
            a {
                font-size: 1vw;
                background: var(--primary);
                color: var(--secondary);
                font-family: 'helvetica', sans-serif;
            }
            img {
                overflow: hidden;
                width: 100%;
                height: 100%;
                color: #fff;
                object-fit: cover;
            }

            /*  */
            #wrap {
                width: 100vw;
                height: 100vh;
            }

            .inner {
                width: 1600px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
            }

            #header {
                position: relative;
                left: 0;
                top: 0;
                background-color: var(--primary);
                z-index: 200;
            }

            #header .inner {
                position: relative;
                font-weight: 500;
                text-transform: uppercase;
                border-bottom: 1px solid #fff;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 40px 0;
            }
            #header h1 {
                position: absolute;
                left: 40%;
                top: 50%;
                transform: translateX(-50%);
                border: 1px solid red;
            }

            #header .logo {
                position: absolute;

                top: 0;
                background: transparent;
            }

            #header ul {
                position: relative;
                z-index: 20;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            #header > div {
                position: relative;
                z-index: 10;
            }

            #header ul {
                display: flex;
                gap: 20px;
            }

            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: var(--primary);
                width: 100%;
                margin-right: auto;
                margin-left: auto;
                padding: 100px 0 0;
                text-align: center;
                box-sizing: border-box;

                .txt {
                    font-family: 'helvetica', sans-serif;
                    font-weight: 300;
                }

                .text-wrap {
                    position: relative;
                    overflow: hidden;
                    margin-top: -1.5em;

                    .text-move {
                        padding-bottom: 2.4em;
                    }
                }
            }
            .con1 h2 {
                margin-top: 0px;
                margin-bottom: 0px;
                font-size: 12.08em;
                line-height: 0.8;
                font-weight: 700;
                letter-spacing: -0.04em;
            }

            .con1 .circle-wrap {
                margin-top: 100px;

                .circle {
                    height: 100vh;
                    display: flex;
                    justify-content: center;
                    align-items: center;

                    .circle-ele {
                        border-radius: 35em;
                        width: 35em;
                        height: 35em;
                        overflow: hidden;
                        display: flex;
                        justify-content: center;
                        align-items: center;

                        & img {
                            position: relative;
                            width: 100vw;
                            height: 100vh;
                            max-width: none;
                            min-height: 100vh;
                            min-width: 100vw;
                            object-fit: cover;
                        }
                    }
                }
            }

            .con2 {
                /* background-color: #e5ffe5; */
                background-color: rgb(232, 226, 218);

                position: relative;
                z-index: 2;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                .inner {
                    width: 1600px;
                }

                .categories {
                    display: flex;
                    justify-content: center;
                    flex-wrap: wrap;
                    align-items: center;
                    padding: 100px 0;

                    li {
                        display: block;
                        position: relative;
                        margin: 10px;
                        padding: 5px 40px;
                        border-radius: 100vw;
                        font-size: 60px;
                        border-radius: 100vw;
                        border: 1px solid #6067f3;
                        color: #6067f3;
                        background-color: transparent;
                        cursor: pointer;
                    }
                }
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>

            <section id="visual">
                <img src="./images/visual1.jpg" alt="" />
            </section>
            <header id="header">
                <div class="inner">
                    <ul class="m1">
                        <li><a href="#">About</a></li>
                        <li><a href="#">product</a></li>
                        <li><a href="#">contact</a></li>
                    </ul>

                    <ul class="m2">
                        <li><a href="#">photo</a></li>

            </header>
            <!--  -->
            <div class="con con1">
                <div class="con-text">
                    <div class="text-wrap">
                        <div class="text-move">
                            <h2>The</h2>
                        </div>
                    </div>
                    <div class="text-wrap">
                        <div class="text-move">
                            <h2 class="txt">FRANTEND</h2>
                        </div>
                    </div>
                    <div class="text-wrap">
                        <div class="text-move">
                            <h2>Portfolio</h2>
                        </div>
                    </div>
                    <div class="text-wrap">
                        <div class="text-move">

                        </div>
                    </div>
                </div>
                <!--//end text  -->

                        <div class="circle-ele">

                    </div>

            </div>

            <div class="con con2">
                <div class="inner">
                    <ul class="categories">
                        <li>React</li>
                        <li>Experience</li>
                        <li>Design Lab</li>
                        <li>Creative UI</li>
                        <li>UX Flow</li>
                        <li>Interaction</li>
                        <li>Frontend</li>
                        <li>Case Study</li>
                        <li>Prototype</li>
                        <li>Micro-UX</li>
                        <li>Interface</li>
                    </ul>
                </div>
            </div>
            <!-- //con2 -->
            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            ScrollTrigger.create({
                trigger: '#header',
                start: 'top top',
                // endTrigger:'.footer',
                end: 'max',
                pin: true,
                pinSpacing: false,
            });

            gsap.set('.logo', {
                scale: 2, // 초기 크기 (100%)
                y: -600, // 초기 y 위치
                transformOrigin: 'center center', // 중심 기준으로 축소/확대
            });

            ScrollTrigger.create({
                trigger: '#visual',
                start: 'top top',
                end: 'bottom 20%',
                animation: gsap.to('.logo', {
                    y: -40, // 아래로 이동
                    scale: 0.8, // 크기를 20%로 축소
                    ease: 'none',
                }),
                scrub: true,
            });

            //con1
            gsap.utils.toArray('.text-wrap').forEach((text, index) => {
                const direction = index % 2 === 0 ? -window.innerWidth : window.innerWidth;

                gsap.fromTo(
                    text.querySelector('.text-move'),
                    { x: direction },
                    {
                        x: 0,
                        ease: 'none',
                        scrollTrigger: {
                            trigger: text,
                            start: 'top center',
                            end: 'bottom center',
                            scrub: true,
                        },
                    }
                );
            });

            //원
            const theme = {
                primary: '#6067f3',
                secondary: '#e8e2da',
            };

            const circleTween = gsap
                .timeline()
                .to('.circle-ele', {
                    borderRadius: 0,
                    width: innerWidth,
                    height: innerHeight,
                })
                .add(changeTheme(), 0);

            ScrollTrigger.create({
                trigger: '.circle-wrap',
                start: 'top top',
                end: '+=2000',
                animation: circleTween,
                pin: true,
                scrub: true,
            });

            function changeTheme(themeMode = 'light') {
                const tween = gsap.to('body, #header', {
                    backgroundColor: themeMode === 'light' ? theme.secondary : theme.primary,
                    color: themeMode === 'light' ? theme.primary : theme.secondary,
                });

                return tween;
            }

            //con2
            const tween = gsap.from('.categories  li', {
                opacity: 0,
                filter: 'blur(3px)',
                stagger: {
                    each: 0.1,
                    from: 'random',
                },
            });

            ScrollTrigger.create({
                trigger: '.con2',
                start: 'top top',
                end: '+=2000',
                animation: tween,
                pin: true,
                scrub: true,
            });
        </script>
    </body>
</html>
