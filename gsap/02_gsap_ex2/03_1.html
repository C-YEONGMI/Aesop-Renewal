<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/smooth-scrollbar@8.7.4/dist/smooth-scrollbar.js"></script>

        <style>
            #wrap {
                overflow-x: hidden;
            }
            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
                display: flex;
            }
            .con3 .left {
                width: 50vw;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background-image: url(../images/bg1.jpg);
                background-size: cover;
                background-repeat: no-repeat;
                background-position: 0 0;
            }
            .con3 .right {
                width: 50vw;
                height: 100vh;
                overflow: hidden;
            }

            .con3 .section {
                width: 100%;
                height: 50vh;
                background: orange;
                overflow-x: hidden;
            }

            .con3 .section:nth-child(even) {
                background: dodgerblue;
            }
            .con3 .section h3 {
                font-size: 30px;
                padding: 20px;
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3">
                <div class="left">
                    <h2>Section 3</h2>
                </div>
                <div class="right">
                    <div class="section">1</div>
                    <div class="section">
                        <h3>2</h3>
                    </div>
                    <div class="section">3</div>
                    <div class="section">4</div>
                    <div class="section">5</div>
                    <div class="section">6</div>
                </div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            const scrollElement = [
                {
                    target: document.querySelector('#wrap'),
                    scrollInstance: null,
                    markerId: 'main',
                },
                {
                    target: document.querySelector('.con3 .right'),
                    scrollInstance: null,
                    markerId: 'section',
                },
            ];

            const scrollbarOptions = {
                damping: 0.08,
                alwaysShowTracks: true,
            };

            scrollElement.forEach((elem) => {
                elem.scrollInstance = Scrollbar.init(elem.target, { ...scrollbarOptions });

                ScrollTrigger.scrollerProxy(elem.target, {
                    scrollTop(value) {
                        if (arguments.length) {
                            elem.scrollInstance.scrollTop = value;
                        }
                        return elem.scrollInstance.scrollTop;
                    },
                    getBoundingClientRect() {
                        return {
                            top: 0,
                            left: 0,
                            width: window.innerWidth,
                            height: window.innerHeight,
                        };
                    },
                });

                elem.scrollInstance.addListener(() => {
                    ScrollTrigger.update();
                });
            });

            ScrollTrigger.getAll().forEach((trigger) => {
                if (trigger.trigger && trigger.trigger.classList.contains('con3')) {
                    trigger.kill();
                }
            });

            scrollElement.forEach((elem) => {
                if (document.querySelector('.gsap-marker-scroller-start')) {
                    const markers = gsap.utils.toArray(`[class*="marker-${elem.markerId}"]`);
                    elem.scrollInstance.addListener(({ offset }) => {
                        gsap.set(markers, { marginTop: -offset.y });
                    });
                }
            });
        </script>
    </body>
</html>
