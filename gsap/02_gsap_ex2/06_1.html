<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

        <style>
            .scroll-area {
                position: relative;
            }

            .lnb {
                position: fixed;
                left: 5vw;
                top: 50%;
                transform: translateY(-50%);
                z-index: 9999;
            }
            .line {
                width: 2px;
                height: 80%;
                background: hotpink;
                position: absolute;
                left: 50%;
                margin-left: -1px;
                top: 0;
                transform-origin: center top;
                transform: scaleY(0); /* 수정: 초기 상태 */
            }

            .lnb ul {
                list-style: none;
                margin: 0;
                padding: 0;
                color: #000;
            }

            .lnb ul > li {
                position: relative;
                margin-bottom: 50px;
            }

            .dot {
                width: 14px;
                height: 14px;
                border-radius: 50%;
                background: hotpink;
                position: relative;
                z-index: 10;
            }

            .lnb span {
                white-space: nowrap;
                position: absolute;
                left: 30px;
                top: 50%;
                transform: translateY(-50%);
                opacity: 0;
                font-weight: bold;
                transition: color 0.3s;
            }

            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div class="scroll-area">
            <nav class="lnb">
                <div class="line"></div>
                <ul>
                    <li>
                        <div class="dot"></div>
                        <span>Home</span>
                    </li>
                    <li>
                        <div class="dot"></div>
                        <span>About</span>
                    </li>
                    <li>
                        <div class="dot"></div>
                        <span>Product</span>
                    </li>
                    <li>
                        <div class="dot"></div>
                        <span>Portfolio</span>
                    </li>
                </ul>
            </nav>

            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>
            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>
            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>
            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            const sections = gsap.utils.toArray('.con');

            sections.forEach((section, index) => {
                const tl = gsap.timeline();

                tl.to(`.lnb li:nth-child(${index + 1}) .dot`, { scale: 1.2 }).to(
                    `.lnb li:nth-child(${index + 1}) span`,
                    {
                        opacity: 1,
                        x: 20,
                        color: index === 1 ? 'white' : 'black',
                    },
                    0
                );

                ScrollTrigger.create({
                    trigger: section,
                    start: 'top center',
                    end: 'bottom center',
                    animation: tl,
                    toggleActions: 'restart reverse restart reverse',
                });
            });

            // line 애니메이션: scaleY(0) → scaleY(1)
            gsap.to('.line', {
                scrollTrigger: {
                    trigger: '.scroll-area',
                    start: 'top top',
                    end: 'bottom bottom',
                    scrub: true,
                },
                scaleY: 1,
                ease: 'none',
            });
        </script>
    </body>
</html>
