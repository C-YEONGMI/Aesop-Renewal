<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollToPlugin.min.js"></script>

        <style>
            #wrap {
                display: flex;
                & .con {
                    flex-shrink: 0;
                }
            }
            .con {
                background-color: #f0f0f0;
                width: 100vw;
                height: 100vh;
                position: relative;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con2 .box {
                width: 150px;
                height: 150px;
                background-color: red;
                margin-top: 100px;
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner">
                    <h2>Section 2</h2>
                    <div class="box"></div>
                </div>
            </div>

            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            // 기본 easing 제거
            gsap.defaults({ ease: 'none' });

            // 섹션 배열 선택
            const sections = gsap.utils.toArray('.con');

            // 수평 스크롤 애니메이션 설정
            const tween = gsap.to(sections, {
                xPercent: -100 * (sections.length - 1),
                scrollTrigger: {
                    trigger: '#wrap',
                    start: 'top top',
                    end: () => '+=' + window.innerWidth * sections.length,
                    pin: true,
                    scrub: 1,
                    // markers: true,
                },
            });
            //con2
            ScrollTrigger.create({
                trigger: '.con2', // animation을 적용할 개별 요소
                containerAnimation: tween, // 수평 스크롤 애니메이션 참조
                start: 'left center',
                end: 'right center',
                animation: gsap.to('.box', { rotation: 360 }),
                scrub: true,
                markers: true,
            });
        </script>
    </body>
</html>
