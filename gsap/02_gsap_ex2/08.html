<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GSAP</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xeressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <style>
            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }

            .con2 {
                background-color: #e5ffe5;
            }

            .con2 .inner {
                display: flex;
                align-items: center;
            }

            .con2 .mask {
                overflow: hidden;
            }

            .con2 .con-box {
                display: flex;
                align-items: center;
                position: relative;
                gap: 160px;
                overflow: hidden;
                height: 100vh;
                width: 100%;
            }

            .con2 .con-box .left {
                flex: 0.7;
                text-align: right;
                z-index: 20;
            }

            .con2 .con-box .left h2 {
                font-size: 80px;
                margin: 0;
            }

            .con2 .con-box .left p {
                font-size: 40px;
                font-style: italic;
                margin-top: -8px;
            }

            .con2 .con-box .right {
                flex: 1;
                z-index: 20;
            }

            .con2 .con-box .right p {
                width: 70%;
                line-height: 27.2px;
                margin-bottom: 64px;
            }

            .con2 .con-box .line {
                position: absolute;
                top: 0;
                left: 42%;
                width: 1px;
                height: 100vh;
                border-right: 1px solid black;
                z-index: 15;
            }

            .con2 .con-box .txt {
                position: absolute;
                display: block;
                font-size: 640px;
                opacity: 0.3;
                z-index: 10;
                white-space: nowrap;
                top: 0%;
                left: 50%;
                transform: translateX(50%);
                font-weight: bold;
                color: #333;
            }

            .con3 {
                background-color: #e5e5ff;
            }

            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div id="sec1" class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div id="sec2" class="con con2">
                <article class="con-box">
                    <div class="left">
                        <div class="mask"><h2>portfolio</h2></div>
                        <div class="mask"><p>process</p></div>
                    </div>
                    <div class="right">
                        <div class="mask">
                            <p>
                                Lorem, ipsum dolor sit amet consectetur adipisicing elit. Reiciendis
                                voluptate nostrum in aperiam odit fugiat officia cum tempore, cumque
                                atque aliquid, accusamus nobis soluta ut aliquam. Illum accusantium
                                fugiat ipsum?
                            </p>
                        </div>
                    </div>
                    <div class="line"></div>
                    <span class="txt">web project</span>
                </article>
            </div>

            <div id="sec3" class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div id="sec4" class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            // 텍스트 등장 애니메이션
            gsap.timeline({
                scrollTrigger: {
                    trigger: '.con-box',
                    start: 'top 70%',
                    end: 'bottom 50%',
                    scrub: 1,
                },
                defaults: {
                    ease: 'power3.out',
                },
            })
                .from('.left h2', { yPercent: 100 })
                .from('.left p', { yPercent: 140 }, '-=0.8')
                .from('.right p', { yPercent: 100, opacity: 0 }, '-=1.2');

            // 배경 텍스트와 라인 애니메이션
            gsap.timeline({
                scrollTrigger: {
                    trigger: '.con-box',
                    start: 'top 80%',
                    end: 'bottom 20%',
                    scrub: 1,
                },
            })
                .from('.line', {
                    scaleY: 0,
                    transformOrigin: 'top center',
                    duration: 1,
                })
                .from('.txt', {
                    xPercent: -100,
                    duration: 1.5,
                });

            // 추가 배경 텍스트 움직임 (더 역동적인 효과)
            gsap.to('.txt', {
                scrollTrigger: {
                    trigger: '.con2',
                    start: 'top center',
                    end: 'bottom top',
                    scrub: 0.5,
                },
                xPercent: 20, // x축 이동 (좌우)
                rotation: 2, // 약간의 회전
                y: 0, // y값 고정
                ease: 'none',
            });
        </script>
    </body>
</html>
