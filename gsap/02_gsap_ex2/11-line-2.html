<html lang="en">

        <style>
            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 3000px;
                position: relative;
            }

            .con1 .svg-container {
                position: sticky;
                top: 10%;

                width: 100%;
                max-width: 1349px;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .con1 svg {
                width: 100%;
                height: auto;
                max-width: 1349px;
            }

            .con1 svg path {
                fill: none;
                stroke: #333;
                stroke-width: 2;
                stroke-linecap: round;
                stroke-linejoin: round;
            }

            .con2 {
                background-color: #e5ffe5;
            }

            .con3 {
                background-color: #e5e5ff;
            }

            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>

            </div>

            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            const paths = document.querySelectorAll('.letter-path');

            // 초기 설정
            const pathLengths = [...paths].map((path) => {
                const length = path.getTotalLength();
                gsap.set(path, {
                    strokeDasharray: length,
                    strokeDashoffset: length,
                });
                return length;
            });

            // 타임라인 설정
            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: '.con1',
                    start: 'top top',
                    end: 'bottom top',
                    scrub: 1,
                    markers: false,
                },
            });

            // 글자 순차 애니메이션
            paths.forEach((path, i) => {
                tl.to(
                    path,
                    {
                        strokeDashoffset: 0,
                        duration: 1,
                        ease: 'none',
                    },
                    i * 0.3 // 시작 지점 시간 간격
                );
            });

            // 마지막 애니메이션 끝나고 색상 변경
            const finalDelay = paths.length * 0.3 + 0.5;
            tl.to(
                paths,
                {
                    stroke: '#ff6b6b',
                    duration: 0.5,
                    ease: 'power2.out',
                },
                finalDelay
            );
        </script>
    </body>
</html>
