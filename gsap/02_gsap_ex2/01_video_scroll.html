<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap scroll video</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

        <style>
            .con {
                background-color: #f0f0f0;
            }
            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }
            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }
            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con3 .inner {
                height: auto;
            }
            .con4 {
                background-color: #fff0cc;
            }

            video {
                width: 100%;
                height: auto;
                display: block;
                margin-top: 30px;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3">
                <div class="inner">
                    <h2>Section 3</h2>
                    <div class="video">
                        <video id="video" src="assets/video1.mp4" muted playsinline></video>
                    </div>
                </div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);
            const video = document.querySelector('#video');

            video.addEventListener('loadedmetadata', () => {
                gsap.to(video, {
                    currentTime: video.duration,
                    ease: 'none',
                    scrollTrigger: {
                        trigger: '.con3',
                        start: 'top top',
                        end: '+=2000',
                        scrub: true,
                        pin: true,
                        markers: true,
                    },
                });
            });

            // 비디오 자동 재생 방지
            video.pause();
        </script>
    </body>
</html>
