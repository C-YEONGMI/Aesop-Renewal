<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollToPlugin.min.js"></script>

        <style>
            html,
            body {
                margin: 0;
                padding: 0;
                overflow-x: hidden;
            }
            #wrap {
                width: 100vw;
                height: 100vh;

                overflow-x: hidden;
            }
            .con {
                background-color: #f0f0f0;
                width: 100vw;
                height: 100vh;
                position: absolute;
                left: 0;
                top: 0;
            }

            .con .inner {
                width: 1400px;

                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            // 타임라인 정의
            const tl = gsap.timeline();

            // 섹션 순회하여 .section01 제외하고 순차 애니메이션 추가
            gsap.utils.toArray('.con').forEach((section, index) => {
                if (!section.classList.contains('con1')) {
                    tl.from(section, {
                        xPercent: index % 2 === 0 ? 100 : -100,
                        duration: 1,
                    });
                }
            });

            // ScrollTrigger에 타임라인 연결
            ScrollTrigger.create({
                trigger: '#wrap',
                start: 'top top',
                end: '+=4000',
                animation: tl,
                pin: true,
                scrub: true,
                markers: true,
            });
        </script>
    </body>
</html>
