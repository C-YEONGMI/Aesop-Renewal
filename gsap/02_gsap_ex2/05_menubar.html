<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <!-- 추가 -->
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollToPlugin.min.js"></script>

        <style>
            .nav {
                position: fixed;
                left: 0;
                top: 0;
                width: 100vw;
                z-index: 999;
                background: rgba(235, 222, 193, 0.6); /* 반투명 */
                backdrop-filter: blur(10px); /* 블러 효과 */
                -webkit-backdrop-filter: blur(10px); /* 사파리 지원 */
                transition: background-color 0.3s ease;
            }

            .nav ul {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 30px 0;
            }

            .nav ul li {
                margin-right: 60px;
            }
            .nav ul li:last-child {
                margin-right: 0px;
            }

            .nav ul li a {
                font-size: 20px;
            }
            /*  */

            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <nav class="nav">
                <ul>
                    <li><a href="#section01"> Home</a></li>
                    <li><a href="#section01"> About</a></li>
                    <li><a href="#section02"> Product</a></li>
                    <li><a href="#section03"> Portfolio</a></li>
                    <li><a href="#section04"> Contact Us</a></li>
                </ul>
            </nav>
            <div class="con con1" id="section01">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2" id="section02">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3" id="section03">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4" id="section04">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>
        <script>
            gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

            const navColor = [
                'rgba(235, 222, 193, 0.8)',
                'rgba(233, 170, 177, 0.8)',
                'rgba(146, 224, 211, 0.8)',
                'rgba(82, 190, 203, 0.8)',
                'rgba(241, 118, 131, 0.8)',
            ];

            const nav = document.querySelector('.nav');
            const sections = gsap.utils.toArray('.con');
            const navItems = gsap.utils.toArray('.nav li a');

            // h2 애니메이션
            gsap.utils.toArray('.con h2').forEach((title) => {
                gsap.fromTo(
                    title,
                    { y: 30, opacity: 0 },
                    {
                        y: 0,
                        opacity: 1,
                        duration: 1,
                        ease: 'power2.out',
                        scrollTrigger: {
                            trigger: title,
                            start: 'top 80%',
                            end: 'bottom 20%',
                            toggleActions: 'play none none reverse',
                        },
                    }
                );
            });

            // 섹션 진입 시 nav 배경색 변경
            sections.forEach((section, index) => {
                ScrollTrigger.create({
                    trigger: section,
                    start: 'top 100px',
                    end: 'bottom 100px',
                    onEnter: () => {
                        gsap.to(nav, {
                            backgroundColor: navColor[index],
                            duration: 0.3,
                            ease: 'power2.out',
                        });
                    },
                    onEnterBack: () => {
                        gsap.to(nav, {
                            backgroundColor: navColor[index],
                            duration: 0.3,
                            ease: 'power2.out',
                        });
                    },
                });
            });

            // nav 클릭 시 해당 섹션으로 부드럽게 이동
            navItems.forEach((link) => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const targetId = link.getAttribute('href');
                    const targetSection = document.querySelector(targetId);

                    if (targetSection) {
                        const offsetTop = targetSection.offsetTop - nav.offsetHeight;

                        gsap.to(window, {
                            duration: 1,
                            scrollTo: {
                                y: offsetTop,
                                autoKill: false,
                            },
                            ease: 'power2.inOut',
                        });
                    }
                });
            });

            // 초기 로드시 nav 배경색 적용
            window.addEventListener('DOMContentLoaded', () => {
                const scrollY = window.scrollY;
                sections.forEach((section, index) => {
                    const sectionTop = section.offsetTop - nav.offsetHeight;
                    const sectionBottom = sectionTop + section.offsetHeight;

                    if (scrollY >= sectionTop && scrollY < sectionBottom) {
                        gsap.set(nav, { backgroundColor: navColor[index] });
                    }
                });
            });
        </script>
    </body>
</html>
