<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollToPlugin.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.1.7/bundled/lenis.min.js"></script>

        <style>
            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
                overflow-x: hidden;
            }

            .con2 .scroll {
                display: flex;
                width: 300%;
            }

            .con2 section {
                height: 100vh;
                width: 100vw;
                display: flex;
                flex: 1;
                align-items: center;
                justify-content: center;
                font-size: 20px;
            }

            .con2 section:nth-of-type(2) {
                background-color: #2b7d7b;
            }

            .con2 section:nth-of-type(3) {
                background-color: #462088;
            }

            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>Section 1</h2></div>
            </div>

            <div class="con con2">
                <div class="outer">
                    <div class="scroll">
                        <section>
                            <h2>How are you today?</h2>
                        </section>
                        <section>
                            <h2 class="animateMe">I'm fine, you?</h2>
                        </section>
                        <section>
                            <h2>Great! Thanks for asking.</h2>
                        </section>
                    </div>
                </div>
            </div>

            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            const scroller = document.querySelector('.scroll');
            const sections = gsap.utils.toArray('.scroll section');

            const scrollTween = gsap.to(sections, {
                xPercent: -100 * (sections.length - 1),
                ease: 'none',
                scrollTrigger: {
                    trigger: scroller,
                    pin: true,
                    scrub: 1,
                    end: () => '+=' + scroller.offsetWidth,
                    snap: {
                        snapTo: 1 / (sections.length - 1),
                        duration: { min: 0.2, max: 0.5 },
                        ease: 'power1.inOut',
                    },
                },
            });

            sections.forEach((section) => {
                const title = section.querySelector('h2');
                if (!title) return;

                gsap.from(title, {
                    opacity: 0,
                    y: -100,
                    scrollTrigger: {
                        trigger: title,
                        containerAnimation: scrollTween,
                        start: 'left center',
                        scrub: 1,
                        toggleActions: 'play none none reverse',
                    },
                });
            });

            //   최신 Lenis 연동
            const lenis = new Lenis({
                duration: 1.2,
                easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                smooth: true,
            });

            function raf(time) {
                lenis.raf(time);
                ScrollTrigger.update(); // ScrollTrigger와 연동
                requestAnimationFrame(raf);
            }

            requestAnimationFrame(raf);
        </script>
    </body>
</html>
