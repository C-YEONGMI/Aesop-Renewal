<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

        <style>
            #wrap {
                overflow-x: hidden;
            }
            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
            }
            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
                padding: 80px 0;
            }
            .con3 h2 {
                font-size: 40px;
                text-align: center;
            }

            .con3 .gallery ul {
                display: flex;
                gap: 20px;
            }

            .con3 .gallery:not(.last) {
                padding-bottom: 1rem;
            }

            .con3 .text {
                font-size: clamp(2rem, 8vw, 8rem);
                line-height: 1.2;
                font-weight: 900;
                padding: 4rem 2rem;
                /* text-align: center; */
            }
            .con3 .text-box p {
                white-space: nowrap;
            }

            .con3 .awsome,
            .con3 .try {
                overflow: hidden;
                height: 100vh;
                width: 100vw;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .con3 .try .text {
                color: #fff;
            }

            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <div id="wrap">
            <div class="con con1">
                <div class="inner"><h2>제목 1</h2></div>
            </div>

            <div class="con con2">
                <div class="inner"><h2>제목 2</h2></div>
            </div>

            <div class="con con3">
                <h2>제목 3</h2>
                <div class="con-box">
                    <article class="text-box">
                        <p class="box text">
                            UI/UX Web Design, Front-end Developer,Web Publisher, Frontend Engineer
                        </p>
                    </article>
                    <article class="gallery">
                        <ul class="box">
                            <li>
                                <img src="images/img1.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/img2.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/img3.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/pic3.jpg" alt="" />
                            </li>
                        </ul>
                    </article>
                    <article class="gallery">
                        <ul class="box">
                            <li>
                                <img src="images/img4.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/img5.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/img6.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/pic6.jpg" alt="" />
                            </li>
                        </ul>
                    </article>
                    <article class="gallery">
                        <ul class="box">
                            <li>
                                <img src="images/pic1.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/pic2.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/pic3.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/pic4.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/pic6.jpg" alt="" />
                            </li>
                        </ul>
                    </article>
                    <article class="gallery">
                        <ul class="box">
                            <li>
                                <img src="images/img5.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/pic5.jpg" alt="" />
                            </li>
                            <li>
                                <img src="images/img1.jpg" alt="" />
                            </li>
                        </ul>
                    </article>
                    <article class="text-box">
                        <p class="box text">
                            UI/UX Web Design, Front-end Developer,Web Publisher, Frontend Engineer
                        </p>
                    </article>

                    <article class="awsome">
                        <div class="text">By Ezen</div>
                    </article>

                    <article class="try">
                        <div class="text">Try NOW.</div>
                    </article>
                </div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>제목 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            const showDemo = () => {
                document.body.style.overflow = 'auto';
                document.scrollingElement.scrollTo(0, 0);

                gsap.utils.toArray('article').forEach((section, index) => {
                    const w = section.querySelector('.box');

                    if (w) {
                        const [x, xEnd] =
                            index % 2
                                ? ['100%', -(w.scrollWidth - innerWidth)]
                                : [-w.scrollWidth, 0];
                        // console.log(x, xEnd);

                        gsap.fromTo(
                            w,
                            { x },
                            {
                                x: xEnd,
                                scrollTrigger: {
                                    trigger: section,
                                    scrub: 0.5,
                                },
                            }
                        );
                    }
                });
            };

            const awsome = () => {
                const tl = gsap
                    .timeline({
                        defaults: {
                            ease: 'none',
                        },
                    })
                    .from('.awsome .text', { x: innerWidth })
                    .to('.awsome .text', { scale: 50, xPercent: -200, color: '#000' })
                    .to('.con3', { duration: 0.3, backgroundColor: '#000' }, '-=0.5');

                ScrollTrigger.create({
                    trigger: '.awsome',
                    start: 'top top',
                    end: '+=3000',
                    animation: tl,
                    pin: true,
                    scrub: 1,
                });
            };

            const tryNow = () => {
                ScrollTrigger.create({
                    trigger: '.try',
                    start: 'top top',
                    end: '+=2000',
                    animation: gsap.from('.try .text', { y: 50, opacity: 0 }),
                    pin: true,
                    scrub: true,
                });
            };

            const init = () => {
                showDemo();
                awsome();
                tryNow();
            };
            init();
        </script>
    </body>
</html>
