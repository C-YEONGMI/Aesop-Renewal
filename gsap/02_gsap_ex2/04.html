<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>gsap</title>
        <link rel="stylesheet" href="css/reset.css" />
        <link rel="shortcut icon" href="images/favicon.ico" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/xpressengine/xeicon@2.3.3/xeicon.min.css"
        />
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>

        <style>
            .con {
                background-color: #f0f0f0;
            }

            .con .inner {
                width: 1400px;
                height: 1000px;
                margin: auto;
                box-sizing: border-box;
                position: relative;
                padding: 150px 0;
            }

            .con h2 {
                font-size: 40px;
                font-weight: 600;
            }

            .con1 {
                background-color: #ffe5e5;
                height: 100vh;
                position: relative;
            }

            .con1 .text_container {
                position: absolute;
                left: 50%;
                top: 10%;
                transform: translateX(-50%);
                text-align: center;
                text-transform: uppercase;
                font-family: 'Playfair Display', serif;
                z-index: 100;
            }

            .con1 .text_container div {
                font-size: 5vw;
                white-space: nowrap;
            }

            .con1 .text_container span {
                font-weight: 300;
                font-style: italic;
                font-family: 'Arial', sans-serif;
            }

            .con1 .image_container {
                display: flex;
                gap: 2rem;
                justify-content: center;
                width: 200vw;
                align-items: center;
                padding-top: 15rem;

                & div {
                    /* max-width: 60vw; */

                    & img {
                        width: 100%;
                    }
                }
            }

            .con1 .small {
                width: 100%;
            }

            .con1 .medium {
                width: 130%;
            }
            .con1 .large {
                width: 200%;
            }

            .con2 {
                background-color: #e5ffe5;
            }
            .con3 {
                background-color: #e5e5ff;
            }
            .con4 {
                background-color: #fff0cc;
            }
        </style>
    </head>
    <body>
        <!--  -->
        <div id="wrap">
            <div class="con con1">
                <div class="text_container">
                    <span class="elem">partner in every way</span>
                    <div class="title">
                        <div class="elem">design the <span>futher</span></div>
                        <div class="elem">gain the edge</div>
                    </div>
                </div>

                <div class="image_container">
                    <div class="small"><img src="./images/img1.jpg" alt="" /></div>
                    <div class="medium"><img src="./images/img2.jpg" alt="" /></div>
                    <div class="large"><img src="./images/img3.jpg" alt="" /></div>
                    <div class="medium"><img src="./images/img4.jpg" alt="" /></div>
                    <div class="small"><img src="./images/img5.jpg" alt="" /></div>

                    <div class="small"><img src="./images/pic1.jpg" alt="" /></div>
                    <div class="medium"><img src="./images/pic2.jpg" alt="" /></div>
                    <div class="large"><img src="./images/pic3.jpg" alt="" /></div>
                    <div class="medium"><img src="./images/pic4.jpg" alt="" /></div>
                    <div class="small"><img src="./images/pic5.jpg" alt="" /></div>
                </div>
            </div>

            <div class="con con2">
                <div class="inner"><h2>Section 2</h2></div>
            </div>

            <div class="con con3">
                <div class="inner"><h2>Section 3</h2></div>
            </div>

            <div class="con con4">
                <div class="inner"><h2>Section 4</h2></div>
            </div>
        </div>

        <script>
            gsap.registerPlugin(ScrollTrigger);

            // 타임라인 정의
            const tl = gsap.timeline({
                defaults: {
                    duration: 3,
                    ease: 'power3.inOut',
                },
            });

            // 1. 이미지 등장 (오른쪽 → 정위치)
            tl.from('.image_container > div', {
                x: innerWidth,
                stagger: {
                    amount: 0.5,
                },
            })

                // 2. 이미지 아래로 이동 (from index 2 기준 반대로)
                .to(
                    '.image_container > div',
                    {
                        y: innerHeight * 0.2,
                        stagger: {
                            amount: 0.5,
                            from: 2,
                        },
                    },
                    '-=1.5'
                )

                // 3. 텍스트 요소 순차적으로 등장
                .from(
                    '.text_container .elem',
                    {
                        y: 30,
                        opacity: 0,
                        stagger: {
                            each: 0.2,
                        },
                        duration: 1,
                    },
                    '-=2'
                );

            // 5. ScrollTrigger: .section01 스크롤 시 이미지 전체 좌측 이동
            ScrollTrigger.create({
                trigger: '.section01',
                start: 'top top',
                end: 'bottom top',
                animation: gsap.to('.image_container', {
                    x: -innerWidth * 0.5,
                    ease: 'none',
                }),
                scrub: true,
                markers: true, // markers() → 최신 문법은 markers: true
            });
        </script>
    </body>
</html>
